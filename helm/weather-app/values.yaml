ingress:
  host: weatherapp.com

secrets:
  mongoUser: ""
  mongoPass: ""
  mongoHost: ""
  mongoPort: ""
  mongoDB: ""
  mongoAuthDB: ""

apps:
  backend:
    kind: Deployment
    image:
      repository: samarthfunde45/weather-backend
      tag: ""
      pullPolicy: IfNotPresent
    replicas: 1
    port: 5000
    service:
      type: ClusterIP
    envFrom:
      - secretRef:
          name: app-secrets
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    livenessProbe:
      httpGet:
        path: /metrics
        port: 5000
      initialDelaySeconds: 20
      periodSeconds: 15
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /metrics
        port: 5000
      initialDelaySeconds: 10
      periodSeconds: 10
      failureThreshold: 3

  frontend:
    kind: Deployment
    image:
      repository: samarthfunde45/weather-frontend
      tag: ""
      pullPolicy: IfNotPresent
    replicas: 1
    port: 80
    service:
      type: ClusterIP
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"
    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 10
      periodSeconds: 15
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 3

  nginx:
    kind: Deployment
    image:
      repository: nginx
      tag: "1.29.8-alpine"
      pullPolicy: IfNotPresent
    replicas: 1
    port: 80
    service:
      type: NodePort
      nodePort: 30926
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
    livenessProbe:
      httpGet:
        path: /healthz
        port: 80
      initialDelaySeconds: 10
      periodSeconds: 15
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /healthz
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 3
    volumeMounts:
      - name: nginx-config
        mountPath: /etc/nginx/conf.d/default.conf
        subPath: nginx.conf
    volumes:
      - name: nginx-config
        configMap:
          name: nginx-config

  mongo:
    kind: StatefulSet
    image:
      repository: mongo
      tag: "8.2.7"
      pullPolicy: IfNotPresent
    replicas: 1
    port: 27017
    storage: "500Mi"
    service:
      type: ClusterIP
      clusterIP: None
    env:
      - name: MONGO_INITDB_ROOT_USERNAME
        valueFrom:
          secretKeyRef:
            name: app-secrets
            key: MONGO_USER
      - name: MONGO_INITDB_ROOT_PASSWORD
        valueFrom:
          secretKeyRef:
            name: app-secrets
            key: MONGO_PASS
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    livenessProbe:
      exec:
        command:
          - mongosh
          - --eval
          - "db.adminCommand('ping')"
          - --quiet
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 3
    readinessProbe:
      exec:
        command:
          - mongosh
          - --eval
          - "db.adminCommand('ping')"
          - --quiet
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 10
      failureThreshold: 3
    volumeMounts:
      - name: mongo-storage
        mountPath: /data/db
    volumes:
      - name: mongo-storage
        persistentVolumeClaim:
          claimName: mongo-pvc
