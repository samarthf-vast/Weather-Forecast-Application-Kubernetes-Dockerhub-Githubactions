apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: {{ .Release.Namespace }}
data:
  nginx.conf: |
    server {
        listen 80;

        location /healthz {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location /weather/ {
            proxy_pass http://backend.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.apps.backend.port }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://frontend.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.apps.frontend.port }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        access_log /dev/stdout;
        error_log /dev/stderr;
    }
