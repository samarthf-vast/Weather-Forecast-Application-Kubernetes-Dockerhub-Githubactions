{{- range $name, $app := .Values.apps }}
---
apiVersion: apps/v1
kind: {{ $app.kind }}
metadata:
  name: {{ include "weather-app.fullname" $ }}-{{ $name }}
  labels:
    {{- include "weather-app.labels" $ | nindent 4 }}
  namespace: {{ $.Release.Namespace }}
spec:
  {{- if eq $app.kind "StatefulSet" }}
  serviceName: {{ $name | quote }}
  {{- end }}
  replicas: {{ $app.replicas }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $app.image.repository }}:{{ $app.image.tag }}"
          imagePullPolicy: {{ $app.image.pullPolicy }}
          ports:
            - containerPort: {{ $app.port }}
          {{- with $app.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $app.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $app.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $app.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $app.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $app.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with $app.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
