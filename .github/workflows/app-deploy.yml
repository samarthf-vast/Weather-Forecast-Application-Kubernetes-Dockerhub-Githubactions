name: App CI/CD

on:
  push:
    branches: ["master", "dev", "qa"]

env:
  BACKEND_IMAGE: samarthfunde45/weather-backend
  FRONTEND_IMAGE: samarthfunde45/weather-frontend
  VERSION: v${{ github.run_number }}
  NAMESPACE: ${{ github.ref_name == 'master' && 'weather-app' || format('weather-app-{0}', github.ref_name) }}
  RELEASE: ${{ github.ref_name == 'master' && 'weather-app' || format('weather-{0}', github.ref_name) }}

jobs:

  # JOB 1: Detect which files changed.

  detect-changes:
    name: Detect Changes
    runs-on: self-hosted
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      helm:     ${{ steps.filter.outputs.helm }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Check which paths changed
        uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            helm:
              - 'helm/**'


  # JOB 2: SonarCloud Code Quality Scan
  # Runs before building — scans source code

  sonarcloud:
    name: SonarCloud Code Scan
    runs-on: self-hosted
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' ||
      needs.detect-changes.outputs.frontend == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io


  # JOB 3: Build Backend (local only, no push)

  build-backend:
    name: Build Backend
    runs-on: self-hosted
    needs: [detect-changes, sonarcloud]
    if: |
      always() && !cancelled() &&
      needs.detect-changes.outputs.backend == 'true' &&
      needs.sonarcloud.result != 'failure'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Build Backend Image (local only)
        uses: docker/build-push-action@v7.1.0
        with:
          context: ./backend
          push: false
          load: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ env.VERSION }}


  # JOB 4: Build Frontend (local only, no push)

  build-frontend:
    name: Build Frontend
    runs-on: self-hosted
    needs: [detect-changes, sonarcloud]
    if: |
      always() && !cancelled() &&
      needs.detect-changes.outputs.frontend == 'true' &&
      needs.sonarcloud.result != 'failure'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Build Frontend Image (local only)
        uses: docker/build-push-action@v7.1.0
        with:
          context: ./frontend
          push: false
          load: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ env.VERSION }}


  # JOB 5: Trivy Security Scan — scans LOCAL images BEFORE pushing to DockerHub
  # If CRITICAL/HIGH found → pipeline fails, nothing pushed

  trivy-scan:
    name: Trivy Security Scan
    runs-on: self-hosted
    needs: [detect-changes, build-backend, build-frontend]
    if: |
      always() && !cancelled() &&
      (
        needs.build-backend.result  == 'success' ||
        needs.build-frontend.result == 'success'
      )

    steps:
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy-db
          restore-keys: ${{ runner.os }}-trivy-db

      - name: Trivy — Scan Backend Image
        if: needs.build-backend.result == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ env.VERSION }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          trivyignores: .trivyignore
          severity: CRITICAL,HIGH
          timeout: 10m

      - name: Trivy — Scan Frontend Image
        if: needs.build-frontend.result == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ env.VERSION }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          trivyignores: .trivyignore
          severity: CRITICAL,HIGH
          timeout: 10m


  # JOB 6: Push to DockerHub — only runs if Trivy scan passed

  push-images:
    name: Push to DockerHub
    runs-on: self-hosted
    needs: [detect-changes, build-backend, build-frontend, trivy-scan]
    if: |
      always() && !cancelled() &&
      needs.trivy-scan.result == 'success' &&
      (
        needs.build-backend.result  == 'success' ||
        needs.build-frontend.result == 'success'
      )

    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Backend Image to DockerHub
        if: needs.build-backend.result == 'success'
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ env.VERSION }}
          

      - name: Push Frontend Image to DockerHub
        if: needs.build-frontend.result == 'success'
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:${{ env.VERSION }}
          


  # JOB 7: Deploy to Kubernetes via Helm

  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: [detect-changes, push-images, build-backend, build-frontend]
    if: |
      always() && !cancelled() &&
      (
        needs.build-backend.result  == 'success' ||
        needs.build-frontend.result == 'success' ||
        needs.detect-changes.outputs.helm == 'true'
      )

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Determine Image Tags
        id: tags
        run: |
          if [ "${{ needs.build-backend.result }}" == "success" ]; then
            BACKEND_TAG="${{ env.VERSION }}"
          else
            BACKEND_TAG=$(curl -s "https://hub.docker.com/v2/repositories/${{ env.BACKEND_IMAGE }}/tags?page_size=10&ordering=last_updated" \
              | grep -o '"name":"[^"]*"' | head -1 | cut -d'"' -f4)
          fi

          if [ "${{ needs.build-frontend.result }}" == "success" ]; then
            FRONTEND_TAG="${{ env.VERSION }}"
          else
            FRONTEND_TAG=$(curl -s "https://hub.docker.com/v2/repositories/${{ env.FRONTEND_IMAGE }}/tags?page_size=10&ordering=last_updated" \
              | grep -o '"name":"[^"]*"' | head -1 | cut -d'"' -f4)
          fi

          if [ -z "$BACKEND_TAG" ] || [ -z "$FRONTEND_TAG" ]; then
            echo "ERROR: Could not determine image tags from DockerHub."
            exit 1
          fi

          echo "backend_tag=${BACKEND_TAG}" >> $GITHUB_OUTPUT
          echo "frontend_tag=${FRONTEND_TAG}" >> $GITHUB_OUTPUT

      - name: Deploy with Helm
        run: |
          VALUES_FILE=""
          [ "${{ github.ref_name }}" != "master" ] && VALUES_FILE="-f helm/weather-app/env/values-${{ github.ref_name }}.yaml"

          helm upgrade --install ${{ env.RELEASE }} ./helm/weather-app \
            $VALUES_FILE \
            -n ${{ env.NAMESPACE }} \
            --set apps.backend.image.tag=${{ steps.tags.outputs.backend_tag }} \
            --set apps.frontend.image.tag=${{ steps.tags.outputs.frontend_tag }} \
            --set secrets.mongoUser=${{ secrets.MONGO_USER }} \
            --set secrets.mongoPass=${{ secrets.MONGO_PASS }} \
            --set secrets.mongoHost=${{ secrets.MONGO_HOST }} \
            --set secrets.mongoPort=${{ secrets.MONGO_PORT }} \
            --set secrets.mongoDB=${{ secrets.MONGO_DB }} \
            --set secrets.mongoAuthDB=${{ secrets.MONGO_AUTH_DB }} \
            --atomic \
            --timeout=5m \
            --create-namespace

      - name: Verify All Pods
        run: kubectl get pods -n ${{ env.NAMESPACE }}
