apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: weather-monitoring
data:
  config.alloy: |
    // Discover all pods in the cluster
    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }

    }

    loki.source.kubernetes "pod_logs" {
      targets    = discovery.relabel.pod_logs.output
      forward_to = [loki.process.pod_pipeline.receiver]
    }

    loki.process "pod_pipeline" {
      forward_to = [loki.write.loki_push.receiver]
    }

    loki.write "loki_push" {
      endpoint {
        url = "http://loki.weather-monitoring.svc.cluster.local:3100/loki/api/v1/push"
      }
    }
