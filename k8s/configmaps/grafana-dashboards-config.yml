apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: weather-monitoring
data:
  dashboard.yml: |
    apiVersion: 1

    providers:
      - name: Infrastructure
        orgId: 1
        folder: Infrastructure
        type: file
        disableDeletion: true
        editable: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
